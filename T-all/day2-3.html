<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            color: beige;
            
            background-color: rgb(133, 96, 96);
            animation-name: trial;
            position: relative;
            font-style: italic;
            font-optical-sizing: 20px;
            animation-duration: 4s;
        }
        @keyframes trial {
            30%   {background-color: rgb(182, 144, 144); left: 20px; top: 200px;}
            25%  {background-color: rgb(133, 133, 124);left: 100px; top: 200px;}
            10%  {background-color: rgb(90, 90, 119);left: 200px; top:20px;}
            100% {background-color: rgb(11, 253, 11); left: 200px; top: 100px;}
            }

    </style>
</head>
<body>
    <div>welcome to digitals</div>
</body>
</html>
