<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="inputString" placeholder="Enter a string">
    <p id="first"></P>
    <button onclick="find()">Separate Uppercase and Lowercase</button>
</body>
<script>
   function find() {
    let value = document.getElementById("inputString").value;
let upper = "";
let lower = ""; 
for (let char of value) {
  if (char >= "A" && char <= "Z") {
    upper += char;
  } else if (char >= "a" && char <= "z") {
    lower += char;
}  
}
result = upper + lower;
document.getElementById("first").innerHTML= result;
   }
</script>
</html>
